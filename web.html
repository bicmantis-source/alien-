<!DOCTYPE html>
<html>
<head>
    <title>NEXA REMOTE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background-color: #0f0f0f;
            color: #00ffaa;
            font-family: Consolas;
            text-align: center;
            padding: 20px;
        }

        input {
            width: 80%;
            padding: 10px;
            background: black;
            color: #00ffaa;
            border: 1px solid #00ffaa;
        }

        button {
            padding: 10px;
            background: #00ffaa;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        #chat {
            margin-top: 20px;
            white-space: pre-wrap;
            text-align: left;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>

<body>

<h2>NEXA REMOTE</h2>

<input id="msg" placeholder="Escribe aquí...">
<br>
<button onclick="send()">Enviar</button>

<div id="chat"></div>

<script>

const API_URL = "https://prudishly-humongous-cornbread.ngrok-free.dev/ask";

async function send() {
    let msg = document.getElementById("msg").value;

    if (!msg) return;

    document.getElementById("chat").innerText += "\nYOU: " + msg + "\n";

    try {
        let res = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ msg: msg })
        });

        let data = await res.json();

        document.getElementById("chat").innerText += 
            "AI: " + (data.response || "sin respuesta") + "\n";

    } catch (err) {
        document.getElementById("chat").innerText += 
            "ERROR: no se pudo conectar con la IA\n";
    }

    document.getElementById("msg").value = "";
}

</script>

</body>
</html>
